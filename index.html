<!DOCTYPE html>
<html>
<head>
    <title>Typing Practice</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Typing Practice System</h1>
<h2 id="timer">Time: 7:00</h2>

<div class="top-bar">
    <select id="level">
        <option value="150">Easy</option>
        <option value="300" selected>Medium</option>
        <option value="450">Hard</option>
    </select>

    <div class="progress-bar">
        <div id="progress"></div>
    </div>
</div>
<div class="container">

    <div class="left">
        <h3>Paragraph</h3>
        <p id="text"></p>
    </div>

    <div class="right">
        <h3>Type Here</h3>
        <textarea id="input"></textarea>
    </div>

</div> <!-- ONLY ONE CLOSING -->

<div class="button-container">
    <button onclick="startSession()">Start</button>
</div>
<script src="script.js"></script>
<div id="resultBox" class="hidden"></div>

</body>
</html>
